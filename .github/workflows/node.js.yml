name: Node.js CI

on:
  push:
  pull_request:
    branches: ["main"]

env:
  CI: true
  SECRET: TEST
  CRON_SECRET: TEST
  YOUTUBE_API_KEY: TEST
  MONGODB_URI: mongodb://TEST

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      # Run the Vitest unit tests; the Playwright integration suites hit live
      # YouTube/MongoDB and are local-only (see playwright.config.ts).
      - run: npm run test:unit
