name: Node.js CI

on:
  push:
  pull_request:
    branches: ["main"]

env:
  CI: true
  SECRET: TEST
  CRON_SECRET: TEST
  YOUTUBE_API_KEY: TEST
  # mongodb service (below) so `npm run build` can prerender the DB-backed homepage.
  MONGODB_URI: mongodb://localhost:27017

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck --if-present
      - run: npm run lint --if-present
      - run: npm run build
      # Run the Vitest unit tests; the Playwright integration suites hit live
      # YouTube/MongoDB and are local-only (see playwright.config.ts).
      - run: npm run test:unit
